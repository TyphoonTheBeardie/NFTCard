<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Preview Card</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
            'fontSize': {
                'title': "23px",
                'description': "19px",
                'price': "17px",
                'time': "17px",
            },
          colors: {
            "main-bg": "hsl(217, 54%, 11%)",
            "card-bg": "hsl(216, 50%, 16%)",
            "card-hover-bg": "hsl(216, 50%, 20%)",
            "secondary": "hsl(215, 51%, 70%)",
            "price": "hsl(178, 100%, 50%)",
            "line": "hsl(215, 32%, 27%)",
          }
        }
      }
    }
    </script>
</head>
<body class="text-white bg-main-bg font-outfit flex flex-col items-center justify-center min-h-screen">
    <main class="card bg-card-bg px-6 pt-6 pb-8 rounded-2xl shadow-2xl max-w-[348px]">
        <article>
            <img class="h-auto rounded-lg" src="./images/image-equilibrium.jpg" alt="Equilibrium #3429">
            <div class="hidden hover:flex h-auto bg-price bg-opacity-50 items-center justify-center rounded-lg">
                <img src="./images/icon-view.svg" alt="View Icon">
            </div>
            <h1 class="text-2xl font-bold mb-2 mt-6">Equilibrium #3429</h1>
            <p class="text-secondary mt-4">Our Equilibrium collection promotes balance and calm.</p>   
            <div class="flex justify-between mt-6">
                <div class="text-price flex items-center gap-1.5">
                    <img src="./images/icon-ethereum.svg" alt="Ethereum Icon">
                    <span>0.041 ETH</span>
                </div>
                <div class="text-secondary flex items-center gap-1.5">
                    <img src="./images/icon-clock.svg" alt="Clock Icon">
                    <span>3 days left</span>
                </div>
            </div> 
        </article>
        <hr class="my-4 border-line">
        <div class="flex items-center">
            <img class="w-8 h-8 rounded-full mr-4 bg-white p-[1px]" src="./images/image-avatar.png" alt="Author Avatar">
            <span class="text-secondary mr-1">Creation of</span><span class="text-white">Jules Wyvern</span>
        </div>
    </main>
</body>
</html>

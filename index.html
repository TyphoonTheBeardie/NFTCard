<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Preview Card</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <article>
            <img src="./images/image-equilibrium.jpg" alt="Equilibrium #3429">
            <div class="overlay">
                <img src="./images/icon-view.svg" alt="View Icon">
            </div>
            <h1>Equilibrium #3429</h1>
            <p>Our Equilibrium collection promotes balance and calm.</p>   
            <div>
                <div class="price">
                    <img src="./images/icon-ethereum.svg" alt="Ethereum Icon">
                    <span>0.041 ETH</span>
                </div>
                <div class="time">
                    <img src="./images/icon-clock.svg" alt="Clock Icon">
                    <span>3 days left</span>
                </div>
            </div> 
        </article>
        <hr>
    </main>
    <footer>
        <div class="author">
            <img src="./images/image-avatar.png" alt="Author Avatar">
            <span>Creation of Jules Wyvern</span>
        </div>
    </footer>
</body>
</html>
